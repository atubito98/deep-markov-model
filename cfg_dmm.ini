#!/usr/bin/env python3
# -*- coding: utf-8 -*-

# Config file for DKS model
# dense_*** can be empty, that means an Identity layer

[User]
# 1: file model    2: console model
logger_type = 1
saved_root = ./saved_model/
data_dir = ./data/h3.6m/dataset

[Network]
name = DKF_simple
c_dim = 4
x_dim = 96
z_dim = 3
num_RNN_gx = 1
dense_h = 128
dropout_p = 0.2
tag = DKF

[Training]
use_cuda = True
optimization = adamW
weight_decay = 1e-3
beta = 8
lr = 0.001
epochs = 200
kl_warm_steps = 6
kl_slope = 0.1
early_stop_patience = 30
save_frequency = 5

[DataFrame]
tau = 2
seed = 0
train_split = 0.70
vali_split = 0.15
shuffle = True
batch_size = 32
num_workers = 0